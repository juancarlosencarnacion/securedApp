services:

  db:
    image: postgres:17
    container_name: securedappdb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - secured_app_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"

volumes:
  secured_app_data:
